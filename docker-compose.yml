version: '3.8'

services:
  # Servicio 1: El Servidor API FastAPI
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - smat_sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/smat.db
    # Solución al Reto: Verificación de estado del backend usando curl incorporado
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Servicio 2: El traductor de protocolos IoT
  mqtt_bridge:
    build: ./iot_device
    # Dependencia estricta: No arranca hasta que el backend esté completamente "healthy"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_URL=http://backend:8000/lecturas/
      - JWT_TOKEN=tu_token_jwt_aqui

# Volumen virtual local para que los datos de SQLite no se borren al apagar el contenedor
volumes:
  smat_sqlite_data:
